<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1200px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:15px;
border-radius:6px;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:26px;
margin-top:6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121821;
padding:15px;
border-radius:6px;
}

canvas{
background:#121821;
padding:10px;
border-radius:6px;
}

.article{
padding:8px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{color:#9cc7ff;text-decoration:none;}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russia" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Coverage Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Coverage</h3>
<div id="news"></div>
</div>


<script>

async function loadData(){

try{

const url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=Euroclear"

const res = await fetch(url)

const data = await res.json()

const articles = data.items || []

updateDashboard(articles)

/* render charts after delay */

setTimeout(function(){

renderCharts(articles)

},200)

}catch(e){

document.getElementById("total").innerText="Error"

}

}


function updateDashboard(articles){

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}
let topics={Russia:0,Regulation:0,Technology:0,Digital:0}

articles.forEach(a=>{

let title=(a.title||"").toLowerCase()

if(title.includes("russia")){
russia++
topics.Russia++
}

if(title.includes("sanction")) topics.Regulation++
if(title.includes("tech")) topics.Technology++
if(title.includes("digital")||title.includes("crypto")) topics.Digital++

let domain=new URL(a.link).hostname.replace("www.","")

if(!sources[domain]) sources[domain]=0

sources[domain]++

})

document.getElementById("russia").innerText =
articles.length?((russia/articles.length)100).toFixed(1)+"%":"0%"

document.getElementById("sources").innerText =
Object.keys(sources).length

renderNews(articles)

}


function renderCharts(articles){

let sources={}
let topics={Russia:0,Regulation:0,Technology:0,Digital:0}

articles.forEach(a=>{

let title=(a.title||"").toLowerCase()

if(title.includes("russia")) topics.Russia++

if(title.includes("sanction")) topics.Regulation++

if(title.includes("tech")) topics.Technology++

if(title.includes("digital")||title.includes("crypto")) topics.Digital++

let domain=new URL(a.link).hostname.replace("www.","")

if(!sources[domain]) sources[domain]=0

sources[domain]++

})

/ trend /

new Chart(document.getElementById("trendChart"),{
type:"bar",
data:{
labels:["Today"],
datasets:[{data:[articles.length]}]
}
})

/ topics /

new Chart(document.getElementById("topicChart"),{
type:"pie",
data:{
labels:Object.keys(topics),
datasets:[{data:Object.values(topics)}]
}
})

/ sources */

const topSources=Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{
labels:topSources.map(s=>s[0]),
datasets:[{data:topSources.map(s=>s[1])}]
}
})

}


function renderNews(articles){

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let row=document.createElement("div")

row.className="article"

row.innerHTML="<a href='"+a.link+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}


loadData()

</script>

</body>
