<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1100px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.box{
background:#121821;
padding:15px;
border-radius:6px;
}

.value{
font-size:26px;
margin-top:6px;
}

canvas{
background:#121821;
padding:10px;
border-radius:6px;
margin-bottom:20px;
}

.article{
padding:8px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{color:#9cc7ff;text-decoration:none;}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="box">
Total Articles
<div id="total" class="value">Loading</div>
</div>

<div class="box">
Russia Narrative Share
<div id="russia" class="value">Loading</div>
</div>

<div class="box">
Unique Sources
<div id="sources" class="value">Loading</div>
</div>

</div>

<canvas id="chart"></canvas>

<h3>Latest Coverage</h3>
<div id="news"></div>

<script>

async function loadData(){

try{

const url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=Euroclear"

const res = await fetch(url)

const data = await res.json()

const articles = data.items || []

updateKPIs(articles)

renderNews(articles)

/* render chart after small delay */

setTimeout(function(){
renderChart(articles)
},200)

}catch(e){

document.getElementById("total").innerText="Error"

}

}

function updateKPIs(articles){

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}

articles.forEach(a=>{

let title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

let domain=new URL(a.link).hostname.replace("www.","")

if(!sources[domain]) sources[domain]=0

sources[domain]++

})

document.getElementById("russia").innerText =
articles.length?((russia/articles.length)*100).toFixed(1)+"%":"0%"

document.getElementById("sources").innerText =
Object.keys(sources).length

}

function renderChart(articles){

let mentions={"Today":articles.length}

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:Object.keys(mentions),
datasets:[{data:Object.values(mentions)}]
}
})

}

function renderNews(articles){

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let row=document.createElement("div")

row.className="article"

row.innerHTML="<a href='"+a.link+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}

loadData()

</script>

</body>
</html>
