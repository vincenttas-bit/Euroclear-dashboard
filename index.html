<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1300px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:16px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:6px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121821;
border:1px solid #1f2a36;
padding:18px;
border-radius:6px;
}

canvas{
max-height:240px;
}

.article{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{color:#9cc7ff;text-decoration:none;}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sourceCount" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>


<script>

async function load(){

try{

const res = await fetch("/api/news")
const data = await res.json()

/* SAFETY DEFAULTS /

const total = data.total || 0
const russiaShare = data.russiaShare || 0
const sources = data.sources || {}
const topics = data.topics || {}
const articles = data.articles || []

/ KPI /

document.getElementById("total").innerText = total

document.getElementById("russiaShare").innerText =
russiaShare.toFixed(1) + "%"

document.getElementById("sourceCount").innerText =
Object.keys(sources).length


/ TOPIC CHART /

if(Object.keys(topics).length > 0){

new Chart(document.getElementById("topicChart"),{

type:"pie",

data:{
labels:Object.keys(topics),
datasets:[{data:Object.values(topics)}]
}

})

}


/ SOURCE CHART /

const sortedSources =
Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

if(sortedSources.length > 0){

new Chart(document.getElementById("sourceChart"),{

type:"bar",

data:{
labels:sortedSources.map(s=>s[0]),
datasets:[{data:sortedSources.map(s=>s[1])}]
}

})

}


/ NEWS */

const news=document.getElementById("news")

articles.forEach(a=>{

let row=document.createElement("div")

row.className="article"

row.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}catch(e){

document.getElementById("total").innerText="API error"

}

}

load()

</script>

</body>
</html>
