<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Monitor</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:900px;
margin:auto;
}

.kpi{
background:#121821;
padding:15px;
margin-bottom:10px;
border-radius:6px;
}

.article{
padding:6px 0;
border-bottom:1px solid #1f2a36;
}

a{
color:#9cc7ff;
text-decoration:none;
}
</style>

</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpi">Total Articles: <span id="total">Loading</span></div>
<div class="kpi">Russia Narrative Share: <span id="russia">Loading</span></div>
<div class="kpi">Unique Sources: <span id="sources">Loading</span></div>

<h3>Latest Coverage</h3>
<div id="news"></div>

<script>

async function load(){

try{

const res = await fetch("/api/news")

const data = await res.json()

console.log("API DATA:", data)

/* SAFE DEFAULTS /

const total = data && data.total ? data.total : 0
const russiaShare = data && data.russiaShare ? data.russiaShare : 0
const sources = data && data.sources ? data.sources : {}
const articles = data && data.articles ? data.articles : []

/ KPIs /

document.getElementById("total").innerText = total
document.getElementById("russia").innerText = russiaShare.toFixed(1) + "%"
document.getElementById("sources").innerText = Object.keys(sources).length

/ ARTICLES */

const news = document.getElementById("news")

articles.forEach(a=>{

let div=document.createElement("div")
div.className="article"

div.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(div)

})

}catch(err){

console.log("DASHBOARD ERROR:", err)

document.getElementById("total").innerText="Error loading dashboard"

}

}

load()

</script>

</body>
</html>
