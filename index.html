<script>

async function loadNews(){

try{

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=250&format=json"

const res=await fetch(url)

if(!res.ok){
throw new Error("API request failed")
}

const data=await res.json()

const articles=data.articles || []

/* KPI */

document.getElementById("total").innerText=articles.length


let russia=0

let topics={Russia:0,Regulation:0,Technology:0,"Digital Assets":0}

let sentiment={Positive:0,Neutral:0,Negative:0}

let mentionsByDay={}
let russiaByDay={}
let sources={}
let regions={}
let drivers={}

let regionArticles={
US:[],
UK:[],
Europe:[],
Asia:[],
"Middle East":[],
"Russia/CIS":[]
}

const newsDiv=document.getElementById("news")
const driversDiv=document.getElementById("drivers")
const regionArticlesDiv=document.getElementById("regionArticles")

newsDiv.innerHTML=""
driversDiv.innerHTML=""
regionArticlesDiv.innerHTML=""

articles.forEach(a=>{

const text=(a.title || "").toLowerCase()

/* Russia detection */

if(text.includes("russia") || text.includes("kremlin")){
russia++
topics.Russia++
}

/* Topic detection */

if(text.includes("sanction") || text.includes("eu"))
topics.Regulation++

if(text.includes("technology") || text.includes("tech"))
topics.Technology++

if(text.includes("digital") || text.includes("crypto") || text.includes("blockchain"))
topics["Digital Assets"]++

/* Sentiment */

if(text.includes("profit") || text.includes("growth"))
sentiment.Positive++
else if(text.includes("sanction") || text.includes("freeze") || text.includes("lawsuit"))
sentiment.Negative++
else
sentiment.Neutral++

/* Time series */

if(a.seendate){

let date=a.seendate.substring(0,8)

if(!mentionsByDay[date]){
mentionsByDay[date]=0
russiaByDay[date]=0
}

mentionsByDay[date]++

if(text.includes("russia"))
russiaByDay[date]++

}

/* Source */

let source=(a.domain || "").replace("www.","")

let allowedSources=[

"reuters.com","bloomberg.com","ft.com","politico.com","politico.eu",
"economist.com","wsj.com",
"nytimes.com","washingtonpost.com","cnn.com",
"bbc.com","bbc.co.uk","theguardian.com",
"elpais.com","lemonde.fr","spiegel.de","ansa.it",
"nikkei.com","scmp.com","straitstimes.com",
"aljazeera.com","arabnews.com",
"tass.com","interfax.ru","kyivpost.com"

]

if(allowedSources.includes(source)){

if(!sources[source]) sources[source]=0
sources[source]++

let region="Other"

if(["nytimes.com","washingtonpost.com","cnn.com"].includes(source)) region="US"
if(["bbc.com","bbc.co.uk","theguardian.com"].includes(source)) region="UK"
if(["elpais.com","lemonde.fr","spiegel.de","ansa.it","politico.eu"].includes(source)) region="Europe"
if(["nikkei.com","scmp.com","straitstimes.com"].includes(source)) region="Asia"
if(["aljazeera.com","arabnews.com"].includes(source)) region="Middle East"
if(["tass.com","interfax.ru","kyivpost.com"].includes(source)) region="Russia/CIS"

if(!regions[region]) regions[region]=0
regions[region]++

regionArticles[region].push(a)

}

/* Drivers */

let keywords=["sanctions","frozen assets","russian assets","asset seizure","litigation","digital assets","blockchain","settlement"]

keywords.forEach(k=>{
if(text.includes(k)){
if(!drivers[k]) drivers[k]=0
drivers[k]++
}
})

})


/* Russia share */

const share=articles.length ? ((russia/articles.length)*100).toFixed(1) : 0
document.getElementById("russiaShare").innerText=share+"%"


/* Time series sorting */

const dates=Object.keys(mentionsByDay).sort()

const labels=dates.map(d=>d.substring(0,4)+"-"+d.substring(4,6)+"-"+d.substring(6,8))

const values=dates.map(d=>mentionsByDay[d]||0)
const russiaValues=dates.map(d=>russiaByDay[d]||0)


/* Momentum */

let last3Total=0,last3Russia=0,prev3Total=0,prev3Russia=0

for(let i=values.length-1;i>=Math.max(values.length-3,0);i--){
last3Total+=values[i]
last3Russia+=russiaValues[i]
}

for(let i=values.length-4;i>=Math.max(values.length-6,0);i--){
prev3Total+=values[i]||0
prev3Russia+=russiaValues[i]||0
}

let lastShare=last3Total?(last3Russia/last3Total)*100:0
let prevShare=prev3Total?(prev3Russia/prev3Total)*100:0

document.getElementById("momentum").innerText=(lastShare-prevShare).toFixed(1)+"%"


/* News feed */

articles.slice(0,10).forEach(a=>{
let item=document.createElement("div")
item.className="list-item"
item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"
newsDiv.appendChild(item)
})


/* Drivers */

Object.entries(drivers)
.sort((a,b)=>b[1]-a[1])
.slice(0,8)
.forEach(d=>{
let item=document.createElement("div")
item.className="list-item"
item.innerText=d[0]+" ("+d[1]+")"
driversDiv.appendChild(item)
})


/* Articles by region */

Object.keys(regionArticles).forEach(region=>{

if(regionArticles[region].length>0){

let block=document.createElement("div")
block.className="region-block"

block.innerHTML="<h4>"+region+"</h4>"

regionArticles[region].slice(0,5).forEach(a=>{

let source=(a.domain || "").replace("www.","").split(".")[0]

let item=document.createElement("div")
item.className="list-item"

item.innerHTML="<b>"+source+"</b> — <a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

block.appendChild(item)

})

regionArticlesDiv.appendChild(block)

}

})


/* Charts */

const chartStyle={borderWidth:2,tension:0.35,pointRadius:2}

new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{labels:labels,datasets:[{data:values,...chartStyle}]}
})

const russiaShareTrend=values.map((v,i)=>v?(russiaValues[i]/v)*100:0)

new Chart(document.getElementById("russiaTrendChart"),{
type:"line",
data:{labels:labels,datasets:[{data:russiaShareTrend,...chartStyle}]}
})

new Chart(document.getElementById("topicChart"),{
type:"pie",
data:{labels:Object.keys(topics),datasets:[{data:Object.values(topics)}]}
})

new Chart(document.getElementById("sentimentChart"),{
type:"pie",
data:{labels:Object.keys(sentiment),datasets:[{data:Object.values(sentiment)}]}
})

const sortedSources=Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{labels:sortedSources.map(s=>s[0]),datasets:[{data:sortedSources.map(s=>s[1])}]}
})

new Chart(document.getElementById("regionChart"),{
type:"pie",
data:{labels:Object.keys(regions),datasets:[{data:Object.values(regions)}]}
})

}catch(error){

console.error(error)

document.getElementById("total").innerText="Error"
document.getElementById("russiaShare").innerText="Error"
document.getElementById("momentum").innerText="Error"

}

}

loadNews()

setInterval(loadNews,3600000)

</script>
