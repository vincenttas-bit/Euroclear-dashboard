<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Narrative Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:30px;
max-width:1100px;
margin:auto;
}

h1{margin-bottom:20px;}

.metrics{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.metric-card{
background:#121821;
padding:15px;
border-radius:8px;
}

.metric{
font-size:26px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.card{
background:#121821;
padding:20px;
border-radius:8px;
}

canvas{
max-height:220px;
}

.list-item{
padding:6px 0;
border-bottom:1px solid #222;
}

a{
color:#9ecbff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Narrative Intelligence Dashboard</h1>


<div class="metrics">

<div class="metric-card">
<div>Total Articles</div>
<div id="total" class="metric">Loading</div>
</div>

<div class="metric-card">
<div>Russia Narrative Share</div>
<div id="russiaShare" class="metric">Loading</div>
</div>

<div class="metric-card">
<div>Status</div>
<div id="status" class="metric">Loading</div>
</div>

</div>


<div class="grid">

<div class="card">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>

<div class="card">
<h3>Russia Narrative Trend</h3>
<canvas id="russiaTrendChart"></canvas>
</div>

</div>


<div class="card">
<h3>Latest Articles (Trusted Media)</h3>
<div id="news"></div>
</div>



<script>

Chart.defaults.animation=false

let mentionsChart
let russiaChart


/* TRUSTED RSS FEEDS */

const feeds=[

"https://feeds.bbci.co.uk/news/business/rss.xml",
"http://rss.cnn.com/rss/cnn_world.rss",
"https://www.reutersagency.com/feed/?best-topics=business-finance",
"https://asia.nikkei.com/rss/feed",
"https://www.ft.com/rss/home",
"https://www.politico.com/rss/politics08.xml"

]


async function fetchFeed(url){

const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

const res=await fetch(proxy)
const xml=await res.text()

const parser=new DOMParser()
const doc=parser.parseFromString(xml,"text/xml")

return [...doc.querySelectorAll("item")]

}


async function loadNews(){

try{

document.getElementById("status").innerText="Loading feeds..."

let items=[]

for(const feed of feeds){

try{

const feedItems=await fetchFeed(feed)

items=items.concat(feedItems)

}catch(e){}

}


/* FILTER EUROCLEAR */

items=items.filter(i=>
i.querySelector("title").textContent.toLowerCase().includes("euroclear")
)


document.getElementById("status").innerText="Live"
document.getElementById("total").innerText=items.length


let russia=0
let mentionsByDay={}
let russiaByDay={}


items.forEach(item=>{

const title=item.querySelector("title").textContent.toLowerCase()
const pubDate=new Date(item.querySelector("pubDate").textContent)

const date=pubDate.toISOString().substring(0,10)


if(!mentionsByDay[date]){

mentionsByDay[date]=0
russiaByDay[date]=0

}

mentionsByDay[date]++


if(title.includes("russia")){

russia++
russiaByDay[date]++

}

})


const share=((russia/items.length)*100).toFixed(1)
document.getElementById("russiaShare").innerText=share+"%"


const labels=Object.keys(mentionsByDay).sort()

const values=labels.map(d=>mentionsByDay[d])
const rvalues=labels.map(d=>russiaByDay[d])



if(mentionsChart) mentionsChart.destroy()

mentionsChart=new Chart(
document.getElementById("mentionsChart"),
{
type:"line",
data:{labels:labels,datasets:[{data:values,tension:0.3}]}
}
)



const rtrend=values.map((v,i)=>v?(rvalues[i]/v)*100:0)

if(russiaChart) russiaChart.destroy()

russiaChart=new Chart(
document.getElementById("russiaTrendChart"),
{
type:"line",
data:{labels:labels,datasets:[{data:rtrend,tension:0.3}]}
}
)



/* ARTICLE LIST */

const newsDiv=document.getElementById("news")

newsDiv.innerHTML=""

items.slice(0,10).forEach(item=>{

const title=item.querySelector("title").textContent
const link=item.querySelector("link").textContent

const div=document.createElement("div")
div.className="list-item"

div.innerHTML="<a href='"+link+"' target='_blank'>"+title+"</a>"

newsDiv.appendChild(div)

})

}catch(err){

document.getElementById("status").innerText="Feed Error"

}

}


loadNews()

setInterval(loadNews,3600000)

</script>

</body>
</html>
