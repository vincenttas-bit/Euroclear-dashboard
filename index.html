<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Chart Test</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:30px;
}

canvas{
width:600px;
height:300px;
background:#222;
}
</style>
</head>

<body>

<h2>Euroclear Chart Test</h2>

<div id="status">Loading...</div>

<canvas id="testChart" height="300"></canvas>

<script>

window.onload = async function(){

console.log("Chart.js loaded:", typeof Chart)

const ctx = document.getElementById("testChart")

new Chart(ctx,{
type:"bar",
data:{
labels:["A","B","C"],
datasets:[{
data:[5,10,7]
}]
}
})

const res = await fetch("https://euroclear-dashboard.vercel.app/api/news")
const data = await res.json()

document.getElementById("status").innerText =
"Articles: " + data.total

}

</script>

</body>
</html>
