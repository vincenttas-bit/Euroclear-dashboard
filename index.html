<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Narrative Intelligence Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:30px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-gap:20px;
}

.card{
background:#121821;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.metric{
font-size:36px;
font-weight:bold;
}

a{
color:#9ecbff;
text-decoration:none;
}

canvas{
margin-top:10px;
}

</style>

</head>

<body>

<h1>Euroclear Narrative Intelligence Dashboard</h1>

<div class="grid">

<div class="card">
<h3>Total Euroclear Articles</h3>
<div id="total" class="metric">Loading...</div>
</div>

<div class="card">
<h3>Russia Narrative Share</h3>
<div id="russiaShare" class="metric">Loading...</div>
</div>

<div class="card">
<h3>Narrative Momentum</h3>
<div id="momentum" class="metric">Loading...</div>
</div>

</div>


<div class="card">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>


<div class="card">
<h3>Russia Narrative Trend</h3>
<canvas id="russiaTrendChart"></canvas>
</div>


<div class="card">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>


<div class="card">
<h3>Sentiment Analysis</h3>
<canvas id="sentimentChart"></canvas>
</div>


<div class="card">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>


<div class="card">
<h3>Latest Euroclear News</h3>
<div id="news"></div>
</div>


<script>

async function loadNews(){

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=120&format=json"

const res=await fetch(url)
const data=await res.json()

const articles=data.articles || []

document.getElementById("total").innerText=articles.length


let russia=0

let topics={
Russia:0,
Regulation:0,
Technology:0,
"Digital Assets":0
}

let sentiment={
Positive:0,
Neutral:0,
Negative:0
}

let mentionsByDay={}
let russiaByDay={}
let sources={}


const newsDiv=document.getElementById("news")
newsDiv.innerHTML=""


articles.forEach(a=>{

const text=(a.title || "").toLowerCase()


/* Russia detection */

if(text.includes("russia") || text.includes("kremlin")){
russia++
topics.Russia++
}


/* Topic detection */

if(text.includes("sanction") || text.includes("eu") || text.includes("regulation")){
topics.Regulation++
}

if(text.includes("technology") || text.includes("tech") || text.includes("platform") || text.includes("infrastructure")){
topics.Technology++
}

if(text.includes("digital") || text.includes("crypto") || text.includes("token") || text.includes("blockchain")){
topics["Digital Assets"]++
}


/* Sentiment detection */

if(text.includes("profit") || text.includes("growth") || text.includes("gain")){
sentiment.Positive++
}

else if(text.includes("sanction") || text.includes("freeze") || text.includes("dispute") || text.includes("lawsuit")){
sentiment.Negative++
}

else{
sentiment.Neutral++
}


/* Time series */

if(a.seendate){

let date=a.seendate.substring(0,8)

if(!mentionsByDay[date]){
mentionsByDay[date]=0
russiaByDay[date]=0
}

mentionsByDay[date]++

if(text.includes("russia")){
russiaByDay[date]++
}

}


/* MEDIA SOURCES FIX */

let source=(a.domain || "").replace("www.","")

if(!source){
source="unknown"
}

if(!sources[source]){
sources[source]=0
}

sources[source]++

})


/* Russia share */

const share=((russia/articles.length)*100).toFixed(1)
document.getElementById("russiaShare").innerText=share+"%"


/* Momentum */

const labels=Object.keys(mentionsByDay)
const values=Object.values(mentionsByDay)
const russiaValues=Object.values(russiaByDay)

const latestShare=(russiaValues[russiaValues.length-1]/values[values.length-1])*100 || 0

const previousShare=(russiaValues[russiaValues.length-7]/values[values.length-7])*100 || 0

const momentum=(latestShare-previousShare).toFixed(1)

document.getElementById("momentum").innerText=momentum+"%"


/* News feed */

articles.slice(0,10).forEach(a=>{

const item=document.createElement("div")

item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

newsDiv.appendChild(item)

})


/* Mentions trend */

new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Euroclear mentions",
data:values,
tension:0.3
}]
}
})


/* Russia trend */

const russiaShareTrend=labels.map((d,i)=>{

let total=values[i]
let rus=russiaValues[i]

return total? (rus/total)*100 : 0

})

new Chart(document.getElementById("russiaTrendChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Russia narrative %",
data:russiaShareTrend,
tension:0.3
}]
}
})


/* Topics */

new Chart(document.getElementById("topicChart"),{
type:"pie",
data:{
labels:Object.keys(topics),
datasets:[{
data:Object.values(topics)
}]
}
})


/* Sentiment */

new Chart(document.getElementById("sentimentChart"),{
type:"pie",
data:{
labels:Object.keys(sentiment),
datasets:[{
data:Object.values(sentiment)
}]
}
})


/* Media sources */

const sortedSources=Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{
labels:sortedSources.map(s=>s[0]),
datasets:[{
label:"Mentions",
data:sortedSources.map(s=>s[1])
}]
}
})

}

loadNews()

setInterval(loadNews,3600000)

</script>

</body>
</html>
