<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Monitor</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1100px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.box{
background:#121821;
padding:15px;
border-radius:6px;
}

.value{
font-size:26px;
margin-top:6px;
}

.article{
padding:8px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="box">
Total Articles
<div id="total" class="value">Loading</div>
</div>

<div class="box">
Russia Share
<div id="russia" class="value">Loading</div>
</div>

<div class="box">
Sources
<div id="sources" class="value">Loading</div>
</div>

</div>

<h3>Latest Coverage</h3>

<div id="news"></div>

<script>

async function load(){

try{

const url="https://api.allorigins.win/raw?url=https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=50&format=json"

const res = await fetch(url)

const data = await res.json()

const articles = data.articles || []

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}

for(let i=0;i<articles.length;i++){

let a=articles[i]

let title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

let domain=(a.domain||"unknown").replace("www.","")

if(!sources[domain]) sources[domain]=0

sources[domain]++

}

document.getElementById("russia").innerText =
articles.length?((russia/articles.length)*100).toFixed(1)+"%":"0%"

document.getElementById("sources").innerText =
Object.keys(sources).length

const news=document.getElementById("news")

for(let i=0;i<articles.length && i<10;i++){

let row=document.createElement("div")

row.className="article"

row.innerHTML="<a href='"+articles[i].url+"' target='_blank'>"+articles[i].title+"</a>"

news.appendChild(row)

}

}catch(e){

document.getElementById("total").innerText="Error loading"

}

}

setTimeout(load,300)

</script>

</body>
</html>
