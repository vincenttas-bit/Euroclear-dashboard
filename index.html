<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
margin:0;
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
font-weight:600;
margin-bottom:20px;
}

.kpi-strip{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:16px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:5px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121821;
border:1px solid #1f2a36;
padding:18px;
border-radius:6px;
}

.panel h3{
margin-top:0;
font-size:14px;
}

canvas{
max-height:230px;
}

.list-item{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpi-strip">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>

<div class="panel">
<h3>Sentiment Analysis</h3>
<canvas id="sentimentChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>

<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", loadNews)

async function loadNews(){

try{

const res = await fetch("https://euroclear-dashboard.vercel.app/api/news")

if(!res.ok){
throw new Error("API request failed")
}

const data = await res.json()

const articles = Array.isArray(data.articles) ? data.articles : []

/* KPI calculation /

let russia = 0
let sources = {}
let topics = {Russia:0,Regulation:0,Technology:0,"Digital Assets":0}
let sentiment = {Positive:0,Neutral:0,Negative:0}
let mentionsByDay = {}

articles.forEach(a=>{

const title = (a.title || "").toLowerCase()

if(title.includes("russia")){
russia++
topics.Russia++
}

if(title.includes("sanction")) topics.Regulation++
if(title.includes("tech") || title.includes("technology")) topics.Technology++
if(title.includes("digital") || title.includes("crypto")) topics["Digital Assets"]++

if(title.includes("profit") || title.includes("growth")) sentiment.Positive++
else if(title.includes("sanction") || title.includes("freeze")) sentiment.Negative++
else sentiment.Neutral++

if(a.seendate){

let date = a.seendate.substring(0,8)

if(!mentionsByDay[date]) mentionsByDay[date] = 0
mentionsByDay[date]++

}

let source = (a.domain || "").replace("www.","")

if(!sources[source]) sources[source] = 0
sources[source]++

})

/ KPI display /

document.getElementById("total").innerText = articles.length

if(articles.length > 0){

document.getElementById("russiaShare").innerText =
((russia / articles.length) * 100).toFixed(1) + "%"

}else{

document.getElementById("russiaShare").innerText = "0%"

}

document.getElementById("sources").innerText =
Object.keys(sources).length

/ mentions timeline /

const dates = Object.keys(mentionsByDay).sort()
const values = dates.map(d=>mentionsByDay[d])

new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{labels:dates,datasets:[{data:values,borderWidth:2}]}
})

/ topic chart /

new Chart(document.getElementById("topicChart"),{
type:"pie",
data:{labels:Object.keys(topics),datasets:[{data:Object.values(topics)}]}
})

/ sentiment chart /

new Chart(document.getElementById("sentimentChart"),{
type:"pie",
data:{labels:Object.keys(sentiment),datasets:[{data:Object.values(sentiment)}]}
})

/ source chart /

const sortedSources =
Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{
labels:sortedSources.map(s=>s[0]),
datasets:[{data:sortedSources.map(s=>s[1])}]
}
})

/ news list */

const news = document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let div = document.createElement("div")
div.className = "list-item"

div.innerHTML =
"<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(div)

})

}catch(e){

console.error(e)

document.getElementById("total").innerText = "API error"

}

}

</script>

</body>
</html>
