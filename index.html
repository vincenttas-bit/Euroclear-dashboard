<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1200px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.box{
background:#121821;
padding:15px;
border-radius:6px;
}

.value{
font-size:26px;
margin-top:6px;
}

canvas{
background:#121821;
padding:10px;
border-radius:6px;
margin-bottom:20px;
}

.article{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}
</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="box">
Total Articles
<div id="total" class="value">Loading</div>
</div>

<div class="box">
Russia Share
<div id="russia" class="value">Loading</div>
</div>

<div class="box">
Unique Sources
<div id="sources" class="value">Loading</div>
</div>

</div>

<canvas id="chart"></canvas>

<h3>Latest Coverage</h3>
<div id="news"></div>

<script>

async function load(){

try{

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=100&format=json"

const response = await fetch(url)

if(!response.ok){
throw new Error("API failed")
}

const data = await response.json()

const articles = data && data.articles ? data.articles : []

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}
let mentions={}

for(let i=0;i<articles.length;i++){

let a=articles[i]

let title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

let domain=(a.domain||"unknown").replace("www.","")

if(!sources[domain]) sources[domain]=0

sources[domain]++

if(a.seendate){

let d=a.seendate.substring(0,8)

if(!mentions[d]) mentions[d]=0

mentions[d]++

}

}

document.getElementById("russia").innerText =
articles.length ? ((russia/articles.length)100).toFixed(1)+"%" : "0%"

document.getElementById("sources").innerText =
Object.keys(sources).length

/ chart /

let labels=Object.keys(mentions).sort()

let values=[]

for(let i=0;i<labels.length;i++){
values.push(mentions[labels[i]])
}

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{data:values,borderWidth:2}]
}
})

/ news */

const news=document.getElementById("news")

for(let i=0;i<10 && i<articles.length;i++){

let row=document.createElement("div")

row.className="article"

row.innerHTML=articles[i].title

news.appendChild(row)

}

}catch(err){

document.getElementById("total").innerText="Error"

}

}

setTimeout(load,200)

</script>

</body>
</html>
