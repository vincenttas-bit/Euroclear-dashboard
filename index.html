<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Narrative Intelligence Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:30px;
max-width:1200px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.metrics{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.metric-card{
background:#121821;
padding:15px;
border-radius:8px;
}

.metric{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.card{
background:#121821;
padding:20px;
border-radius:8px;
}

canvas{
max-height:220px;
}

.list-item{
padding:5px 0;
border-bottom:1px solid #222;
}

a{
color:#9ecbff;
text-decoration:none;
}

.region-block{
margin-top:10px;
}

</style>

</head>

<body>

<h1>Euroclear Narrative Intelligence Dashboard</h1>


<div class="metrics">

<div class="metric-card">
<div>Total Articles</div>
<div id="total" class="metric">Loading...</div>
</div>

<div class="metric-card">
<div>Russia Narrative Share</div>
<div id="russiaShare" class="metric">Loading...</div>
</div>

<div class="metric-card">
<div>Status</div>
<div id="status" class="metric">Loading</div>
</div>

</div>



<div class="grid">

<div class="card">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>

<div class="card">
<h3>Russia Narrative Trend</h3>
<canvas id="russiaTrendChart"></canvas>
</div>

<div class="card">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

<div class="card">
<h3>Media by Region</h3>
<canvas id="regionChart"></canvas>
</div>

</div>



<div class="grid">

<div class="card">
<h3>Latest Euroclear News</h3>
<div id="news"></div>
</div>

<div class="card">
<h3>Articles by Region</h3>
<div id="regionArticles"></div>
</div>

</div>



<script>

Chart.defaults.animation = false

let mentionsChart
let russiaChart
let sourceChart
let regionChart

async function loadNews(){

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear%20sanctions&mode=ArtList&maxrecords=100&format=json"

try{

const res=await fetch(url)
const data=await res.json()

const articles=data.articles || []

document.getElementById("status").innerText="Live"
document.getElementById("total").innerText=articles.length


let russia=0
let mentionsByDay={}
let russiaByDay={}
let sources={}
let regions={}
let regionArticles={}

articles.forEach(a=>{

const text=(a.title || "").toLowerCase()

if(text.includes("russia")) russia++

if(a.seendate){

let date=a.seendate.substring(4,8)

if(!mentionsByDay[date]){
mentionsByDay[date]=0
russiaByDay[date]=0
}

mentionsByDay[date]++

if(text.includes("russia")) russiaByDay[date]++

}

let source=(a.domain || "").replace("www.","")

if(!sources[source]) sources[source]=0
sources[source]++


let region="Global"

if(source.includes("cnn") || source.includes("nytimes")) region="US"
if(source.includes("bbc") || source.includes("guardian")) region="UK"
if(source.includes("elpais") || source.includes("lemonde")) region="Europe"
if(source.includes("nikkei")) region="Asia"
if(source.includes("tass")) region="Russia/CIS"

if(!regions[region]) regions[region]=0
regions[region]++

if(!regionArticles[region]) regionArticles[region]=[]
regionArticles[region].push(a)

})


const share=articles.length?((russia/articles.length)*100).toFixed(1):0

document.getElementById("russiaShare").innerText=share+"%"


const labels=Object.keys(mentionsByDay)
const values=Object.values(mentionsByDay)
const rvalues=Object.values(russiaByDay)


if(mentionsChart) mentionsChart.destroy()

mentionsChart=new Chart(
document.getElementById("mentionsChart"),
{
type:"line",
data:{labels:labels,datasets:[{data:values,tension:0.3}]}
}
)


const rtrend=values.map((v,i)=>v?(rvalues[i]/v)*100:0)

if(russiaChart) russiaChart.destroy()

russiaChart=new Chart(
document.getElementById("russiaTrendChart"),
{
type:"line",
data:{labels:labels,datasets:[{data:rtrend,tension:0.3}]}
}
)


const topSources=Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

if(sourceChart) sourceChart.destroy()

sourceChart=new Chart(
document.getElementById("sourceChart"),
{
type:"bar",
data:{
labels:topSources.map(s=>s[0]),
datasets:[{data:topSources.map(s=>s[1])}]
}
}
)


if(regionChart) regionChart.destroy()

regionChart=new Chart(
document.getElementById("regionChart"),
{
type:"pie",
data:{
labels:Object.keys(regions),
datasets:[{data:Object.values(regions)}]
}
}
)


const newsDiv=document.getElementById("news")
newsDiv.innerHTML=""

articles.slice(0,10).forEach(a=>{

const item=document.createElement("div")
item.className="list-item"

item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

newsDiv.appendChild(item)

})


const regionDiv=document.getElementById("regionArticles")
regionDiv.innerHTML=""

Object.keys(regionArticles).forEach(region=>{

const block=document.createElement("div")
block.className="region-block"

block.innerHTML="<b>"+region+"</b>"

regionArticles[region].slice(0,5).forEach(a=>{

let source=(a.domain || "").split(".")[0]

const item=document.createElement("div")
item.className="list-item"

item.innerHTML="<b>"+source+"</b> — <a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

block.appendChild(item)

})

regionDiv.appendChild(block)

})

}catch(err){

console.log(err)
document.getElementById("status").innerText="API Error"

}

}

loadNews()

setInterval(loadNews,7200000)

</script>

</body>
</html>
