<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:20px;
font-weight:600;
}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:16px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:6px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.panel{
background:#121821;
padding:18px;
border-radius:6px;
border:1px solid #1f2a36;
}

canvas{
max-height:240px;
}

.news-item{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>


<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Euroclear Mentions Trend</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>

<div class="panel">
<h3>Sentiment Analysis</h3>
<canvas id="sentimentChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>


<script>

async function loadData(){

try{

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=150&format=json"

const res=await fetch(url)

const json=await res.json()

const articles=Array.isArray(json.articles)?json.articles:[]

/* DATA STRUCTURES /

let russia=0
let sources={}
let mentions={}
let topics={Russia:0,Regulation:0,Technology:0,Digital:0}
let sentiment={Positive:0,Neutral:0,Negative:0}

/ PROCESS ARTICLES /

articles.forEach(a=>{

let title=(a.title||"").toLowerCase()

/ Russia /

if(title.includes("russia")){
russia++
topics.Russia++
}

/ topics /

if(title.includes("sanction")) topics.Regulation++
if(title.includes("tech")||title.includes("technology")) topics.Technology++
if(title.includes("digital")||title.includes("crypto")) topics.Digital++

/ sentiment /

if(title.includes("profit")||title.includes("gain")) sentiment.Positive++
else if(title.includes("sanction")||title.includes("freeze")) sentiment.Negative++
else sentiment.Neutral++

/ timeline /

if(a.seendate){

let d=a.seendate.substring(0,8)

if(!mentions[d]) mentions[d]=0

mentions[d]++

}

/ source /

let source=(a.domain||"unknown").replace("www.","")

if(!sources[source]) sources[source]=0

sources[source]++

})


/ KPI DISPLAY */

document.getElementById("total").innerText=articles.length

document.getElementById("russiaShare").innerText=
articles.length?((russia/articles.length)100).toFixed(1)+"%":"0%"

document.getElementById("sources").innerText=
Object.keys(sources).length


/ TREND CHART /

const dates=Object.keys(mentions).sort()

new Chart(document.getElementById("trendChart"),{
type:"line",
data:{
labels:dates,
datasets:[{
data:dates.map(d=>mentions[d]),
borderWidth:2
}]
}
})


/ TOPIC CHART /

new Chart(document.getElementById("topicChart"),{
type:"pie",
data:{
labels:Object.keys(topics),
datasets:[{data:Object.values(topics)}]
}
})


/ SENTIMENT /

new Chart(document.getElementById("sentimentChart"),{
type:"pie",
data:{
labels:Object.keys(sentiment),
datasets:[{data:Object.values(sentiment)}]
}
})


/ SOURCE CHART /

const topSources=
Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{
labels:topSources.map(s=>s[0]),
datasets:[{data:topSources.map(s=>s[1])}]
}
})


/ NEWS FEED */

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let row=document.createElement("div")

row.className="news-item"

row.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}catch(e){

console.error(e)

document.getElementById("total").innerText="Error loading data"

}

}

loadData()

</script>

</body>
</html>
