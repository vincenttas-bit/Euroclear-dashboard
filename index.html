}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1300px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:15px;
border-radius:6px;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:26px;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121821;
padding:15px;
border-radius:6px;
}

canvas{
max-height:230px;
}

.news{
font-size:13px;
padding:6px 0;
border-bottom:1px solid #1f2a36;
}

a{color:#9cc7ff;text-decoration:none}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russia" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Mentions Trend</h3>
<canvas id="trend"></canvas>
</div>

<div class="panel">
<h3>Top Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Coverage</h3>
<div id="news"></div>
</div>


<script>

async function load(){

try{

const res = await fetch("/api/news")

const text = await res.text()

const data = JSON.parse(text)

const articles = Array.isArray(data.articles) ? data.articles : []

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}
let mentions={}

articles.forEach(a=>{

let title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

let src=(a.domain||"unknown").replace("www.","")

if(!sources[src]) sources[src]=0

sources[src]++

if(a.seendate){

let d=a.seendate.substring(0,8)

if(!mentions[d]) mentions[d]=0

mentions[d]++

}

})

document.getElementById("russia").innerText =
articles.length ? ((russia/articles.length)100).toFixed(1)+"%" : "0%"

document.getElementById("sources").innerText =
Object.keys(sources).length

/ trend /

const dates=Object.keys(mentions).sort()

new Chart(document.getElementById("trend"),{
type:"line",
data:{
labels:dates,
datasets:[{
data:dates.map(d=>mentions[d]),
borderWidth:2
}]
}
})

/ sources /

const top=Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

new Chart(document.getElementById("sourceChart"),{
type:"bar",
data:{
labels:top.map(s=>s[0]),
datasets:[{data:top.map(s=>s[1])}]
}
})

/ news */

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

const row=document.createElement("div")

row.className="news"

row.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}catch(e){

document.getElementById("total").innerText="API error"

console.error(e)

}

}

load()

</script>

</body>
</html
