<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:15px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:5px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121821;
padding:18px;
border-radius:6px;
border:1px solid #1f2a36;
}

canvas{
max-height:240px;
}

.news-item{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}
</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Euroclear Mentions Trend</h3>
<canvas id="trend"></canvas>
</div>

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topics"></canvas>
</div>

<div class="panel">
<h3>Sentiment</h3>
<canvas id="sentiment"></canvas>
</div>

<div class="panel">
<h3>Top Sources</h3>
<canvas id="sourcesChart"></canvas>
</div>

</div>

<div class="panel">
<h3>Latest Coverage</h3>
<div id="news"></div>
</div>


<script>

async function load(){

try{

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=150&format=json"

const res=await fetch(url)

const data=await res.json()

const articles=data.articles || []

/* KPI */

document.getElementById("total").innerText=articles.length

let russia=0
let sources={}
let mentions={}
let topics={Russia:0,Regulation:0,Technology:0,"Digital":0}
let sentiment={Positive:0,Neutral:0,Negative:0}

articles.forEach(a=>{

let t=(a.title||"").toLowerCase()

if(t.includes("russia")){
russia++
topics.Russia++
}

if(t.includes("sanction")) topics.Regulation++
if(t.includes("tech")) topics.Technology++
if(t.includes("digital")||t.includes("crypto")) topics.Digital++

if(t.includes("profit")||t.includes("gain")) sentiment.Positive++
else if(t.includes("sanction")||t.includes("freeze")) sentiment.Negative++
else sentiment.Neutral++

let source=(a.domain||"unknown").replace("www.","")

if(!sources[source]) sources[source]=0
sources[source]++

if(a.seendate){

let d=a.seendate.substring(0,8)

if(!mentions[d]) mentions[d]=0
mentions[d]++

}

})

document.getElementById("russiaShare").innerText=
articles.length ? ((russia/articles.length)100).toFixed(1)+"%" : "0%"

document.getElementById("sources").innerText=
Object.keys(sources).length

/ charts /

const dates=Object.keys(mentions).sort()

new Chart(document.getElementById("trend"),{
type:"line",
data:{labels:dates,datasets:[{data:dates.map(d=>mentions[d]),borderWidth:2}]}
})

new Chart(document.getElementById("topics"),{
type:"pie",
data:{labels:Object.keys(topics),datasets:[{data:Object.values(topics)}]}
})

new Chart(document.getElementById("sentiment"),{
type:"pie",
data:{labels:Object.keys(sentiment),datasets:[{data:Object.values(sentiment)}]}
})

const top=Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6)

new Chart(document.getElementById("sourcesChart"),{
type:"bar",
data:{labels:top.map(s=>s[0]),datasets:[{data:top.map(s=>s[1])}]}
})

/ news */

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

const row=document.createElement("div")

row.className="news-item"

row.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

}catch(e){

console.error(e)

document.getElementById("total").innerText="Error loading data"

}

}

load()

</script>

</body>
</html>
