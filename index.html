<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:system-ui;
background:#0b0f14;
color:white;
padding:30px;
max-width:1200px;
margin:auto;
}

h1{margin-bottom:20px}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.box{
background:#121821;
padding:15px;
border-radius:6px;
}

.value{
font-size:28px;
margin-top:6px;
}

canvas{
background:#121821;
padding:10px;
border-radius:6px;
margin-bottom:20px;
}
</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="box">
Total Articles
<div id="total" class="value">Loading</div>
</div>

<div class="box">
Russia Share
<div id="russia" class="value">Loading</div>
</div>

<div class="box">
Unique Sources
<div id="sources" class="value">Loading</div>
</div>

</div>

<canvas id="mentionsChart"></canvas>

<h3>Latest Articles</h3>
<div id="news"></div>

<script>

async function loadData(){

try{

const url="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=150&format=json"

const res=await fetch(url)
const json=await res.json()

const articles=Array.isArray(json.articles)?json.articles:[]

document.getElementById("total").innerText=articles.length

let russia=0
let sources={}
let mentions={}

articles.forEach(a=>{

const title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

let source=(a.domain||"unknown").replace("www.","")

if(!sources[source]) sources[source]=0
sources[source]++

if(a.seendate){

let d=a.seendate.substring(0,8)

if(!mentions[d]) mentions[d]=0

mentions[d]++

}

})

document.getElementById("russia").innerText=
articles.length?((russia/articles.length)*100).toFixed(1)+"%":"0%"

document.getElementById("sources").innerText=
Object.keys(sources).length

const dates=Object.keys(mentions).sort()

new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{
labels:dates,
datasets:[{
data:dates.map(d=>mentions[d]),
borderWidth:2
}]
}
})

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let div=document.createElement("div")

div.innerHTML="<p>"+a.title+"</p>"

news.appendChild(div)

})

}catch(e){

console.error(e)

document.getElementById("total").innerText="Error"

}

}

loadData()

</script>

</body>
</html>
