<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
padding:30px;
max-width:1100px;
margin:auto;
}

h1{margin-bottom:20px;}

.kpis{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:15px;
border-radius:6px;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:26px;
margin-top:6px;
}

canvas{
background:#121821;
padding:10px;
border-radius:6px;
margin-bottom:20px;
}

.article{
padding:8px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{color:#9cc7ff;text-decoration:none;}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Monitor</h1>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Total Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russia" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>

<canvas id="chart"></canvas>

<h3>Latest Coverage</h3>
<div id="news"></div>

<script>

async function load(){

try{

const res = await fetch("/api/news")

const data = await res.json()

document.getElementById("total").innerText = data.total

document.getElementById("russia").innerText =
data.russiaShare.toFixed(1) + "%"

document.getElementById("sources").innerText =
data.sources

const news=document.getElementById("news")

data.articles.forEach(a=>{

let row=document.createElement("div")

row.className="article"

row.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(row)

})

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Euroclear Coverage"],
datasets:[{data:[data.total]}]
}

})

}catch(e){

document.getElementById("total").innerText="API error"

}

}

load()

</script>

</body>
</ht
