<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Dashboard Test</title>

<style>
body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:40px;
}

.box{
background:#121821;
padding:20px;
margin-bottom:20px;
border-radius:6px;
}

.value{
font-size:32px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Euroclear API Test</h1>

<div class="box">
Total Articles
<div id="total" class="value">Loading</div>
</div>

<div class="box">
Russia Narrative Share
<div id="russiaShare" class="value">Loading</div>
</div>

<div class="box">
Unique Sources
<div id="sources" class="value">Loading</div>
</div>

<div class="box">
Latest Headlines
<div id="news"></div>
</div>

<script>

async function loadNews(){

try{

const res = await fetch("/api/news")

const data = await res.json()

const articles = data.articles || []

document.getElementById("total").innerText = articles.length

let russia = 0
let sources = {}

articles.forEach(a=>{

const text=(a.title||"").toLowerCase()

if(text.includes("russia")) russia++

let source=(a.domain||"").replace("www.","")

if(!sources[source]) sources[source]=0
sources[source]++

})

document.getElementById("russiaShare").innerText =
((russia/articles.length)*100).toFixed(1)+"%"

document.getElementById("sources").innerText =
Object.keys(sources).length

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

let div=document.createElement("div")

div.innerHTML="<p>"+a.title+"</p>"

news.appendChild(div)

})

}catch(e){

console.error(e)

document.getElementById("total").innerText="API error"

}

}

loadNews()

</script>

</body>
</ht
