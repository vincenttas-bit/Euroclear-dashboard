<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Narrative Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:30px;
max-width:1200px;
margin:auto;
}

h1{margin-bottom:20px;}

.metrics{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.metric-card{
background:#121821;
padding:15px;
border-radius:8px;
}

.metric{
font-size:28px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.card{
background:#121821;
padding:20px;
border-radius:8px;
}

canvas{max-height:220px;}

.list-item{
padding:5px 0;
border-bottom:1px solid #222;
}

a{color:#9ecbff;text-decoration:none;}
</style>

</head>

<body>

<h1>Euroclear Narrative Intelligence Dashboard</h1>

<div class="metrics">

<div class="metric-card">
<div>Total Articles</div>
<div id="total" class="metric">Loading...</div>
</div>

<div class="metric-card">
<div>Russia Narrative Share</div>
<div id="russiaShare" class="metric">Loading...</div>
</div>

<div class="metric-card">
<div>Status</div>
<div id="status" class="metric">Loading</div>
</div>

</div>



<div class="grid">

<div class="card">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>

<div class="card">
<h3>Russia Narrative Trend</h3>
<canvas id="russiaTrendChart"></canvas>
</div>

</div>



<div class="card">
<h3>Latest Articles</h3>
<div id="news"></div>
</div>



<script>

async function loadNews(){

const proxy="https://api.allorigins.win/raw?url="
const api="https://api.gdeltproject.org/api/v2/doc/doc?query=Euroclear&mode=ArtList&maxrecords=100&format=json"

try{

const res=await fetch(proxy+encodeURIComponent(api))
const data=await res.json()

const articles=data.articles || []

document.getElementById("status").innerText="Live"
document.getElementById("total").innerText=articles.length

let russia=0

let mentionsByDay={}
let russiaByDay={}

articles.forEach(a=>{

const text=(a.title || "").toLowerCase()

if(text.includes("russia")) russia++

if(a.seendate){

let date=a.seendate.substring(4,8)

if(!mentionsByDay[date]){
mentionsByDay[date]=0
russiaByDay[date]=0
}

mentionsByDay[date]++

if(text.includes("russia")) russiaByDay[date]++

}

})

const share=((russia/articles.length)*100).toFixed(1)

document.getElementById("russiaShare").innerText=share+"%"


const labels=Object.keys(mentionsByDay)
const values=Object.values(mentionsByDay)
const rvalues=Object.values(russiaByDay)


new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{labels:labels,datasets:[{data:values,tension:0.3}]}
})

const rtrend=values.map((v,i)=>v?(rvalues[i]/v)*100:0)

new Chart(document.getElementById("russiaTrendChart"),{
type:"line",
data:{labels:labels,datasets:[{data:rtrend,tension:0.3}]}
})


const newsDiv=document.getElementById("news")

articles.slice(0,10).forEach(a=>{

const item=document.createElement("div")

item.className="list-item"

item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

newsDiv.appendChild(item)

})

}catch(err){

document.getElementById("status").innerText="API Error"

console.log(err)

}

}

loadNews()

</script>

</body>
</html>
