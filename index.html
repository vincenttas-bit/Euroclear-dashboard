<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#d0d7de;
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
color:white;
margin-bottom:20px;
}

.kpi-strip{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-bottom:25px;
}

.kpi{
background:#11161c;
border:1px solid #1f2a36;
border-radius:6px;
padding:16px;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:25px;
}

.panel{
background:#11161c;
border:1px solid #1f2a36;
border-radius:6px;
padding:18px;
}

.panel h3{
font-size:12px;
text-transform:uppercase;
color:#9fb3c8;
margin-bottom:12px;
}

canvas{
max-height:220px;
}

.list-item{
padding:6px 0;
border-bottom:1px solid #1d2630;
font-size:13px;
}

a{
color:#8ab4ff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpi-strip">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sourceCount" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourcesChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>



<script>

Chart.defaults.animation=false
let charts=[]

async function loadNews(){

try{

const res = await fetch("/api/news")

const data = await res.json()

const articles = data.articles || []

document.getElementById("total").innerText = articles.length

let russia=0
let sources={}
let mentionsByDay={}

const newsDiv=document.getElementById("news")
newsDiv.innerHTML=""

articles.slice(0,10).forEach(a=>{

const title=(a.title||"").toLowerCase()

if(title.includes("russia")) russia++

const source=(a.domain||"").replace("www.","")

if(!sources[source]) sources[source]=0
sources[source]++

if(a.seendate){

const d=a.seendate.substring(0,8)

if(!mentionsByDay[d]) mentionsByDay[d]=0

mentionsByDay[d]++

}

const item=document.createElement("div")
item.className="list-item"
item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

newsDiv.appendChild(item)

})

document.getElementById("russiaShare").innerText =
((russia/articles.length)*100).toFixed(1)+"%"

document.getElementById("sourceCount").innerText =
Object.keys(sources).length

const dates=Object.keys(mentionsByDay).sort()

const values=dates.map(d=>mentionsByDay[d])

charts.forEach(c=>c.destroy())
charts=[]

charts.push(new Chart(document.getElementById("mentionsChart"),{
type:"line",
data:{labels:dates,datasets:[{data:values,borderColor:"#8ab4ff"}]}
}))

const sortedSources=
Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6)

charts.push(new Chart(document.getElementById("sourcesChart"),{
type:"bar",
data:{
labels:sortedSources.map(s=>s[0]),
datasets:[{
data:sortedSources.map(s=>s[1]),
backgroundColor:"#8ab4ff"
}]
}
}))

}catch(e){

document.getElementById("total").innerText="API Error"

}

}

loadNews()

setInterval(loadNews,3600000)

</script>

</body>
</ht
