<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
margin:0;
padding:30px;
max-width:1500px;
margin:auto;
}

h1{
font-weight:600;
margin-bottom:20px;
}

.kpi-strip{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-bottom:22px;
}

.kpi{
background:#121821;
padding:16px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:30px;
font-weight:600;
margin-top:6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:20px;
}

.panel{
background:#121821;
border:1px solid #1f2a36;
border-radius:6px;
padding:18px;
}

.panel h3{
margin-top:0;
font-size:14px;
font-weight:600;
}

canvas{
max-height:230px;
}

.analytics{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:20px;
}

.list-item{
padding:6px 0;
border-bottom:1px solid #1d2630;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}

.region-block{
margin-top:12px;
}

.region-block h4{
margin-bottom:6px;
font-size:13px;
color:#9fb3c8;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpi-strip">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>

<div class="grid">

<div class="panel">
<h3>Euroclear Mentions Trend</h3>
<canvas id="mentionsChart" height="300"></canvas>
</div>

<div class="panel">
<h3>Russia Narrative Trend</h3>
<canvas id="russiaTrendChart" height="300"></canvas>
</div>

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart" height="300"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart" height="300"></canvas>
</div>

</div>

<div class="analytics">

<div class="panel">
<h3>Narrative Drivers</h3>
<div id="drivers"></div>
</div>

<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>

</div>

<div class="panel">
<h3>Articles by Region</h3>
<div id="regionArticles"></div>
</div>

<script>

window.onload = load

async function load(){

let data={}

try{

const res = await fetch("https://euroclear-dashboard.vercel.app/api/news")
data = await res.json()

}catch(e){

console.log("API error",e)

}

let articles = data.articles || []
const sources = data.sources || {}

document.getElementById("total").innerText = data.total || 0
document.getElementById("russiaShare").innerText = ((data.russiaShare)||0).toFixed(1)+"%"
document.getElementById("sources").innerText = Object.keys(sources).length


 /* REMOVE DUPLICATES */ 

const seen=new Set()

articles=articles.filter(a=>{
if(seen.has(a.title)) return false
seen.add(a.title)
return true
})


/ TOPIC ANALYSIS /

let topics={Russia:0,Regulation:0,Technology:0,Digital:0,Other:0}

articles.forEach(a=>{

const t=(a.title||"").toLowerCase()

if(t.includes("sanction")||t.includes("frozen assets")) topics.Regulation++
else if(t.includes("digital")||t.includes("crypto")) topics.Digital++
else if(t.includes("tech")||t.includes("platform")) topics.Technology++
else if(t.includes("russia")) topics.Russia++
else topics.Other++

})


/ TIME SERIES */

let mentionsByDay={}
let russiaByDay={}

articles.forEach(a=>{

if(!a.seendate) return

let d=a.seendate.substring(0,8)

if(!mentionsByDay[d]){
mentionsByDay[d]=0
russiaByDay[d]=0
}

mentionsByDay[d]++

if((a.title||"").toLowerCase().includes("russia"))
russiaByDay[d]++

})

const dates=Object.keys(mentionsByDay).sort()

const labels=dates.map(d=>d.substring(0,4)+"-"+d.substring(4,6)+"-"+d.substring(6,8))

const mentionsValues=dates.map(d=>mentionsByDay[d])

const russiaTrend=dates.map(d=>{
let total=mentionsByDay[d]
let r=russiaByDay[d]
return total ? (r/total)100 : 0
})


/ CHARTS /

new Chart(document.getElementById("mentionsChart").getContext("2d"),{
type:"line",
data:{labels:labels,datasets:[{data:mentionsValues,tension:0.3}]}
})

new Chart(document.getElementById("russiaTrendChart").getContext("2d"),{
type:"line",
data:{labels:labels,datasets:[{data:russiaTrend,tension:0.3}]}
})

new Chart(document.getElementById("topicChart").getContext("2d"),{
type:"pie",
data:{labels:Object.keys(topics),datasets:[{data:Object.values(topics)}]}
})

const sortedSources=Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6)

new Chart(document.getElementById("sourceChart").getContext("2d"),{
type:"bar",
data:{labels:sortedSources.map(s=>s[0]),datasets:[{data:sortedSources.map(s=>s[1])}]}
})


/ NARRATIVE DRIVERS /

const keywords=[
"sanctions","frozen assets","russian assets",
"asset seizure","litigation","digital assets",
"blockchain","settlement","central bank reserves"
]

let drivers={}

articles.forEach(a=>{
const t=(a.title||"").toLowerCase()

keywords.forEach(k=>{
if(t.includes(k)){
if(!drivers[k]) drivers[k]=0
drivers[k]++
}
})
})

const driversDiv=document.getElementById("drivers")

Object.entries(drivers)
.sort((a,b)=>b[1]-a[1])
.slice(0,8)
.forEach(d=>{
let item=document.createElement("div")
item.className="list-item"
item.innerText=d[0]+" ("+d[1]+")"
driversDiv.appendChild(item)
})


/ NEWS /

const news=document.getElementById("news")

articles.slice(0,10).forEach(a=>{
let item=document.createElement("div")
item.className="list-item"
item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"
news.appendChild(item)
})


/ REGIONS */

const regionMap={
"United States":"US",
"United Kingdom":"UK",
"France":"Europe",
"Germany":"Europe",
"Spain":"Europe",
"Italy":"Europe",
"Belgium":"Europe",
"Russia":"Russia/CIS",
"Ukraine":"Russia/CIS",
"India":"Asia",
"China":"Asia",
"Japan":"Asia",
"Singapore":"Asia",
"Australia":"Asia"
}

let regions={}

articles.forEach(a=>{

const country=a.sourcecountry||"Other"
const region=regionMap[country]||"Other"

if(!regions[region]) regions[region]=[]
regions[region].push(a)

})

const regionDiv=document.getElementById("regionArticles")

Object.entries(regions).forEach(([region,list])=>{

let block=document.createElement("div")
block.className="region-block"
block.innerHTML="<h4>"+region+"</h4>"

list.slice(0,5).forEach(a=>{
let item=document.createElement("div")
item.className="list-item"
item.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"
block.appendChild(item)
})

regionDiv.appendChild(block)

})

}

</script>

</body>
</html>
