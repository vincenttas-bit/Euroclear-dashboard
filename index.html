<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Euroclear Geopolitical Intelligence Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f14;
color:#e6edf3;
margin:0;
padding:30px;
max-width:1400px;
margin:auto;
}

h1{
font-weight:600;
margin-bottom:25px;
}

.kpi-strip{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.kpi{
background:#121821;
padding:18px;
border-radius:6px;
border:1px solid #1f2a36;
}

.kpi-title{
font-size:12px;
color:#8b9bb0;
}

.kpi-value{
font-size:28px;
margin-top:6px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.panel{
background:#121821;
border:1px solid #1f2a36;
padding:18px;
border-radius:6px;
}

.panel h3{
margin-top:0;
font-size:14px;
font-weight:600;
}

canvas{
max-height:220px;
}

.article{
padding:6px 0;
border-bottom:1px solid #1f2a36;
font-size:13px;
}

a{
color:#9cc7ff;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Euroclear Geopolitical Intelligence Monitor</h1>

<div class="kpi-strip">

<div class="kpi">
<div class="kpi-title">Total Euroclear Articles</div>
<div id="total" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Russia Narrative Share</div>
<div id="russiaShare" class="kpi-value">Loading</div>
</div>

<div class="kpi">
<div class="kpi-title">Unique Sources</div>
<div id="sources" class="kpi-value">Loading</div>
</div>

</div>


<div class="grid">

<div class="panel">
<h3>Topic Distribution</h3>
<canvas id="topicChart"></canvas>
</div>

<div class="panel">
<h3>Top Media Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>


<div class="panel">
<h3>Latest Euroclear Coverage</h3>
<div id="news"></div>
</div>


<script>

document.addEventListener("DOMContentLoaded", load)

async function load(){

try{

const res = await fetch("https://euroclear-dashboard.vercel.app/api/news")
const data = await res.json()

const total = data.total || 0
const russiaShare = data.russiaShare || 0
const sources = data.sources || {}
const articles = data.articles || []

document.getElementById("total").innerText = total
document.getElementById("russiaShare").innerText = russiaShare.toFixed(1) + "%"
document.getElementById("sources").innerText = Object.keys(sources).length


/* COMPUTE TOPICS FROM ARTICLES /

let topics={
Russia:0,
Regulation:0,
Technology:0,
Digital:0
}

articles.forEach(a=>{

let t=(a.title||"").toLowerCase()

if(t.includes("russia")) topics.Russia++
if(t.includes("sanction")) topics.Regulation++
if(t.includes("tech")||t.includes("technology")) topics.Technology++
if(t.includes("digital")||t.includes("crypto")) topics.Digital++

})


/ TOPIC CHART /

const ctx1=document.getElementById("topicChart").getContext("2d")

new Chart(ctx1,{
type:"pie",
data:{
labels:Object.keys(topics),
datasets:[{
data:Object.values(topics)
}]
}
})


/ SOURCE CHART /

const sortedSources=
Object.entries(sources)
.sort((a,b)=>b[1]-a[1])
.slice(0,6)

const ctx2=document.getElementById("sourceChart").getContext("2d")

new Chart(ctx2,{
type:"bar",
data:{
labels:sortedSources.map(s=>s[0]),
datasets:[{
data:sortedSources.map(s=>s[1])
}]
}
})


/ NEWS FEED */

const news=document.getElementById("news")

news.innerHTML=""

articles.forEach(a=>{

let div=document.createElement("div")
div.className="article"

div.innerHTML="<a href='"+a.url+"' target='_blank'>"+a.title+"</a>"

news.appendChild(div)

})

}catch(e){

console.log("Dashboard error:",e)

}

}

</script>

</body>
</html>
